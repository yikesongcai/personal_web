server:
  port: 8080

spring:
  application:
    name: personal-web-ai

  datasource:
    url: ${APP_DB_URL:jdbc:h2:file:./data/personalweb-ai;AUTO_SERVER=TRUE}
    username: ${APP_DB_USER:sa}
    password: ${APP_DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-o4-mini}
          temperature: 0.2
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

    vectorstore:
      dashvector:
        api-key: ${DASHVECTOR_API_KEY}
        endpoint: ${DASHVECTOR_ENDPOINT}
        collection-name: ${DASHVECTOR_COLLECTION_NAME:personal-portfolio}

app:
  rag:
    top-k: 5
    similarity-threshold: 0.6
    auto-ingest-mock: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
