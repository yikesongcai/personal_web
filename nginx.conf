server {
    listen 80;
    server_name localhost;
    client_max_body_size 50m;
    
    # ======== 【前端代码部署目录】 ========
    # 当用户直接访问域名或 IP 根路径时，从容器里 Nginx html 目录响应前端文件
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 支持 Vue3 / React 的 History 路由模式，找不到文件自动回放 index.html
        try_files $uri $uri/ /index.html;
    }

    # ======== 【动态接口代理】 ========
    # 这里的意思是，只要在浏览器请求路径里以 `/api` 开头，比如 `/api/chat`
    # Nginx 就会静默地去请求在同一个 docker 网络环境里的名称为 `backend` 的服务器容器的 `8080` 端口
    location /api/ {
        proxy_pass http://backend:8080;
        
        # --- 下面这几行是支持 SSE 聊天打字机流式输出的【核心关键】！ ---
        # 它们强制关闭了 Nginx 常规的反向代理缓存池，防止它把数据合并成一块才返回
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 60s;
        # -------------------------------------------------------------
    }
}