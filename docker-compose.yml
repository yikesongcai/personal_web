version: '3.8'

services:
  core-mysql:
    image: mysql:8.0
    container_name: core-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_DB_PASSWORD:-123456}
      MYSQL_DATABASE: personal_web_ai
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-api
    volumes:
      - ./logs:/app/logs
      - ./backend/uploads:/app/uploads
    restart: always
    depends_on:
      - core-mysql
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-ui
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
