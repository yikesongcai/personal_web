version: '3.8'

services:
  core-mysql:
    image: mysql:8.0
    container_name: core-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_DB_PASSWORD:-123456}
      MYSQL_DATABASE: personal_web_ai
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-api
    volumes:
      - ./logs:/app/logs
      - ./backend/uploads:/app/uploads
    restart: always
    depends_on:
      - core-mysql
    env_file:
      - .env
    environment:
      - APP_DB_URL=jdbc:mysql://core-mysql:3306/personal_web_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - APP_DB_USER=root

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-ui
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
